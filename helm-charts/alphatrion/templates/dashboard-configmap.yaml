apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "alphatrion.dashboard.fullname" . }}
  labels:
    {{- include "alphatrion.dashboard.labels" . | nindent 4 }}
data:
  nginx.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # SPA fallback - serve index.html for all routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to server
        location /api {
            proxy_pass http://{{ include "alphatrion.server.fullname" . }}:{{ .Values.server.service.port }};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy GraphQL requests to server
        location /graphql {
            proxy_pass http://{{ include "alphatrion.server.fullname" . }}:{{ .Values.server.service.port }};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
