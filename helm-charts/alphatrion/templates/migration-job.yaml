{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "alphatrion.fullname" . }}-migration
  labels:
    {{- include "alphatrion.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "alphatrion.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: alembic-upgrade
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              # Construct database URL with password from secret
              export ALPHATRION_METADATA_DB_URL="postgresql+psycopg2://{{ include "alphatrion.postgresql.username" . }}:${POSTGRES_PASSWORD}@{{ include "alphatrion.postgresql.host" . }}:{{ include "alphatrion.postgresql.port" . }}/{{ include "alphatrion.postgresql.database" . }}"
              echo "Running database migrations..."
              alembic upgrade head
              echo "Migrations completed successfully!"
          env:
            # Database password from secret
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "alphatrion.postgresql.secretName" . }}
                  key: {{ include "alphatrion.postgresql.secretKey" . }}
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
{{- end }}
