apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "alphatrion.server.fullname" . }}
  labels:
    {{- include "alphatrion.server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.server.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "alphatrion.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/server-configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/server-secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "alphatrion.server.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "alphatrion.serviceAccountName" . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: server
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              # Construct database URL with password from secret
              export ALPHATRION_METADATA_DB_URL="postgresql+psycopg2://{{ include "alphatrion.postgresql.username" . }}:${POSTGRES_PASSWORD}@{{ include "alphatrion.postgresql.host" . }}:{{ include "alphatrion.postgresql.port" . }}/{{ include "alphatrion.postgresql.database" . }}"
              # Start the server
              exec alphatrion server --host 0.0.0.0 --port 8000
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            # Database password from secret
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "alphatrion.postgresql.secretName" . }}
                  key: {{ include "alphatrion.postgresql.secretKey" . }}

            # ClickHouse password (if enabled)
            {{- if .Values.clickhouse.enabled }}
            - name: ALPHATRION_CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "alphatrion.clickhouse.secretName" . }}
                  key: clickhouse-password
            {{- end }}

          envFrom:
            # Non-sensitive environment variables
            - configMapRef:
                name: {{ include "alphatrion.server.fullname" . }}

          {{- if .Values.server.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.server.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.server.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.server.livenessProbe.failureThreshold }}
          {{- end }}

          {{- if .Values.server.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.server.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.server.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.server.readinessProbe.failureThreshold }}
          {{- end }}

          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
